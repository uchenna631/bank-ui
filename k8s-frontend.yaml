apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-ui
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bank-ui
  template:
    metadata:
      labels:
        app: bank-ui
    spec:
      containers:
        - name: bank-ui
          image: fimber/bank-ui:v1.0
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_BACKEND_URL
              value: "http://bank-api.backend.svc.cluster.local"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bank-ui
  namespace: frontend
spec:
  type: NodePort
  selector:
    app: bank-ui
  ports:
    - port: 80
      targetPort: 80
